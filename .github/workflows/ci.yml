name: VerdictChain CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  contract-tests:
    name: 🦀 Smart Contract Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli --features opt 2>/dev/null || true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test dispute-court (12 tests)
        run: cargo test -p dispute-court --features testutils -- --nocapture

      - name: Test juror-registry (9 tests)
        run: cargo test -p juror-registry --features testutils -- --nocapture

      - name: Build WASM
        run: |
          cargo build --target wasm32-unknown-unknown --release -p dispute-court
          cargo build --target wasm32-unknown-unknown --release -p juror-registry

      - name: Optimize WASM
        run: |
          soroban contract optimize \
            --wasm target/wasm32-unknown-unknown/release/dispute_court.wasm \
            --wasm-out target/wasm32-unknown-unknown/release/dispute_court.optimized.wasm
          soroban contract optimize \
            --wasm target/wasm32-unknown-unknown/release/juror_registry.wasm \
            --wasm-out target/wasm32-unknown-unknown/release/juror_registry.optimized.wasm

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: contracts/target/wasm32-unknown-unknown/release/*.optimized.wasm
          retention-days: 30

  frontend-tests:
    name: ⚡ Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_DISPUTE_COURT_ID:  ${{ secrets.DISPUTE_COURT_ID  || 'PLACEHOLDER' }}
          VITE_JUROR_REGISTRY_ID: ${{ secrets.JUROR_REGISTRY_ID || 'PLACEHOLDER' }}

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  deploy-contracts:
    name: 🚀 Deploy to Testnet
    needs: [contract-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            contracts/target/
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('contracts/Cargo.lock') }}

      - uses: actions/download-artifact@v4
        with:
          name: wasm-contracts
          path: contracts/target/wasm32-unknown-unknown/release/

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli --features opt 2>/dev/null || true

      - name: Configure network
        run: |
          soroban network add \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015" \
            testnet || true

      - name: Fund deployer
        run: |
          soroban keys generate deployer --network testnet 2>/dev/null || true
          curl -s "https://friendbot.stellar.org?addr=$(soroban keys address deployer)" | jq .

      - name: Deploy JurorRegistry
        id: deploy-registry
        run: |
          REGISTRY_ID=$(soroban contract deploy \
            --wasm target/wasm32-unknown-unknown/release/juror_registry.optimized.wasm \
            --source deployer --network testnet)
          echo "REGISTRY_ID=$REGISTRY_ID" >> $GITHUB_OUTPUT
          echo "JurorRegistry: $REGISTRY_ID"

      - name: Deploy DisputeCourt
        id: deploy-court
        run: |
          COURT_ID=$(soroban contract deploy \
            --wasm target/wasm32-unknown-unknown/release/dispute_court.optimized.wasm \
            --source deployer --network testnet)
          echo "COURT_ID=$COURT_ID" >> $GITHUB_OUTPUT
          echo "DisputeCourt: $COURT_ID"

      - name: Initialize contracts
        run: |
          DEPLOYER=$(soroban keys address deployer)
          REGISTRY_ID="${{ steps.deploy-registry.outputs.REGISTRY_ID }}"
          COURT_ID="${{ steps.deploy-court.outputs.COURT_ID }}"

          # Get native XLM SAC
          NATIVE=$(soroban contract id asset --asset native --network testnet 2>/dev/null || echo "$DEPLOYER")

          soroban contract invoke --id "$REGISTRY_ID" \
            --source deployer --network testnet \
            -- initialize --admin "$DEPLOYER" --court_address "$COURT_ID"

          soroban contract invoke --id "$COURT_ID" \
            --source deployer --network testnet \
            -- initialize \
            --admin "$DEPLOYER" \
            --registry_address "$REGISTRY_ID" \
            --token_address "$NATIVE" \
            --min_stake 100000000 \
            --vote_period_secs 604800

          echo "✅ Both contracts initialized"

      - name: Save deployment manifest
        run: |
          mkdir -p ../deployment
          cat > ../deployment/testnet.json << EOF
          {
            "network":        "testnet",
            "deployed_at":    "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit":         "${{ github.sha }}",
            "dispute_court":  "${{ steps.deploy-court.outputs.COURT_ID }}",
            "juror_registry": "${{ steps.deploy-registry.outputs.REGISTRY_ID }}"
          }
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: deployment-manifest
          path: deployment/testnet.json

  deploy-frontend:
    name: 🌐 Deploy Frontend
    needs: [deploy-contracts, frontend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'
