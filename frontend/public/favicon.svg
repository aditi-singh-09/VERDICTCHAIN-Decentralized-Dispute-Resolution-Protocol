<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0A0608"/>
  <!-- Pillar -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="#B8892A" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="7" y1="10" x2="25" y2="10" stroke="#B8892A" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Top ornament -->
  <circle cx="16" cy="4" r="2" fill="#B8892A" opacity="0.8"/>
  <!-- Left chain -->
  <line x1="8"  y1="10" x2="8"  y2="19" stroke="#B8892A" stroke-width="0.8" stroke-dasharray="2,1.5"/>
  <!-- Right chain -->
  <line x1="24" y1="10" x2="24" y2="17" stroke="#B8892A" stroke-width="0.8" stroke-dasharray="2,1.5"/>
  <!-- Left pan (lower) -->
  <ellipse cx="8"  cy="21" rx="5" ry="2" fill="none" stroke="#B8892A" stroke-width="1.2"/>
  <!-- Right pan (higher) -->
  <ellipse cx="24" cy="19" rx="5" ry="2" fill="none" stroke="#7B1D3A" stroke-width="1.2"/>
  <!-- Base -->
  <line x1="11" y1="28" x2="21" y2="28" stroke="#B8892A" stroke-width="1.5" stroke-linecap="round"/>
</svg>
